server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:literiskapp}
    username: ${DB_USER:literiskapp}
    password: ${DB_PASSWORD:literiskapp}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 1000
        order_inserts: true
        order_updates: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  security:
    bearer-token: ${BEARER_TOKEN:}

logging:
  file:
    name: /app/logs/literiskapp.log
  level:
    root: INFO
    com.literiskapp: DEBUG
