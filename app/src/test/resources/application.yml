spring:
  datasource:
    url: "jdbc:h2:mem:literiskapp;MODE=PostgreSQL;DB_CLOSE_DELAY=-1"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  security:
    bearer-token: test-token

logging:
  level:
    root: WARN
    com.literiskapp: INFO
